<script>
// ── Embedded experiment data is loaded from data.js ───────────────────────
const MAP_W      = 565;
const MAP_H      = 565;
const R_AGENT    = 5.0;
const N_AGENTS   = 256;
const N_NEURONS  = 64;
const KE         = 8;       // n_exteroceptor angular bins
const MICRO      = 5; // micro steps per macro step

// ── Simulation state ──────────────────────────────────────────────────────
let VI = 0, PI = 0;       // current slider indices
let macT = 0;
let prevOn = 0, sigmaLive = NaN;
const SALPHA = 0.06;
let warmupCnt = 0;
const WARMUP  = 15;
let playing = false, raf = null, lastTs = null, accMs = 0;
const MS_PER_STEP = 80;

const pos    = new Float32Array(N_AGENTS * 2);
const ang    = new Float32Array(N_AGENTS);
const lights = new Uint8Array(N_AGENTS);
const res    = new Uint8Array(N_AGENTS * N_NEURONS);
const nxt    = new Uint8Array(N_AGENTS * N_NEURONS);
const obs    = new Uint8Array(N_AGENTS * KE);

let adjIJ  = new Int16Array(0);
let adjDXY = new Float32Array(0);
let NE     = 0;
let pow1mP = new Float64Array(N_NEURONS + 1);

// ── Avalanche tracking ────────────────────────────────────────────────────
const AV_CAP = 4000;
let avSizes = new Float32Array(AV_CAP);
let avDurs  = new Float32Array(AV_CAP);
let avCount = 0;
let avActive = false, avSz = 0, avDur = 0;

// ── Multi-realization cycling ─────────────────────────────────────────────
// Each "rep" = one random adjacency (positions). Statistics accumulate across reps.
// Stats reset only when VD or P changes.
// At the end of each rep any still-open (censored) avalanche is discarded, exactly
// as in the paper.  Supercritical regime → all cascades censored → plot says so.
const STEPS_PER_REP = 500;   // macro steps per adjacency realization
let repStep  = 0;
let repCount = 0;
let simStartTime = null;   // set on first macroStep after init / param change
let darkSteps = 0;         // consecutive steps with nOn === 0

// ── Helpers ───────────────────────────────────────────────────────────────
let repFlash = 0;   // frames to show rep-change border flash

function cssColor(varName) {
  const root = document.documentElement;
  return getComputedStyle(root).getPropertyValue(varName).trim();
}

// Inferno-consistent accent colors (sampled from heatColor LUT)
const IC_SZ  = heatColor(0.75);  // orange  – size distribution / σ_eff curve
const IC_DUR = heatColor(0.52);  // red     – duration distribution
const IC_CUR = heatColor(0.95);  // yellow  – current-p cursor

// ── DOM refs ──────────────────────────────────────────────────────────────
const mainCanvas = document.getElementById('main-canvas');
const mainCtx    = mainCanvas.getContext('2d');
const plotSigma  = document.getElementById('plot-sigma');
const heatCanvas = document.getElementById('heatmap');
const infoBox    = document.getElementById('info-box');
const agentInfo  = document.getElementById('agent-info');
const avCanvas   = document.getElementById('plot-avalanche');
const avCountEl  = document.getElementById('av-count');
const simMetaEl  = document.getElementById('sim-meta');
const vdSl       = document.getElementById('vd-sl');
const pSl        = document.getElementById('p-sl');
const vdDisp     = document.getElementById('vd-disp');
const pDisp      = document.getElementById('p-disp');
const playBtn    = document.getElementById('play-btn');
const speedSel   = document.getElementById('speed-sel');
const adjTog     = document.getElementById('adj-tog');

// ── Canvas resize ─────────────────────────────────────────────────────────
function resizeMain() {
  const side = Math.min(window.innerWidth - 280, window.innerHeight - 240, 680);
  mainCanvas.width = mainCanvas.height = Math.max(320, side);
  drawFireflies();
}
window.addEventListener('resize', resizeMain);

function tx(x) { return (x / MAP_W) * mainCanvas.width;  }
function ty(y) { return (y / MAP_H) * mainCanvas.height; }
function tr()  { return Math.max(2, (R_AGENT / MAP_W) * mainCanvas.width); }

// ── Draw: firefly canvas ──────────────────────────────────────────────────
function drawFireflies() {
  const W = mainCanvas.width, H = mainCanvas.height, r = tr();
  mainCtx.clearRect(0, 0, W, H);
  mainCtx.fillStyle = cssColor('--surface-base'); mainCtx.fillRect(0, 0, W, H);

  if (adjTog.checked && NE > 0) {
    mainCtx.strokeStyle = cssColor('--edge-adjacency');
    mainCtx.lineWidth = 0.5;
    mainCtx.beginPath();
    for (let e = 0; e < NE; e++) {
      const i = adjIJ[2*e];
      mainCtx.moveTo(tx(pos[2*i]),             ty(pos[2*i+1]));
      mainCtx.lineTo(tx(pos[2*i]+adjDXY[2*e]), ty(pos[2*i+1]+adjDXY[2*e+1]));
    }
    mainCtx.stroke();
  }

  mainCtx.fillStyle = cssColor('--node-off');
  for (let a = 0; a < N_AGENTS; a++) {
    if (lights[a]) continue;
    mainCtx.beginPath(); mainCtx.arc(tx(pos[2*a]), ty(pos[2*a+1]), r, 0, Math.PI*2); mainCtx.fill();
  }
  mainCtx.shadowColor = cssColor('--node-on'); mainCtx.shadowBlur = r * 3; mainCtx.fillStyle = cssColor('--node-on');
  for (let a = 0; a < N_AGENTS; a++) {
    if (!lights[a]) continue;
    mainCtx.beginPath(); mainCtx.arc(tx(pos[2*a]), ty(pos[2*a+1]), r, 0, Math.PI*2); mainCtx.fill();
  }
  mainCtx.shadowBlur = 0;

  // Brief border flash when a new adjacency realization begins
  if (repFlash > 0) {
    const base = cssColor('--flash-reinit') || 'rgba(231,116,36,1)';
    const alpha = (repFlash / 6 * 0.7).toFixed(3);
    const rgb = base.replace(/^rgba?\(([^)]+)\)/, '$1').split(',');
    const [r,g,b] = rgb.map(x => parseFloat(x));
    mainCtx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
    mainCtx.lineWidth = 3;
    mainCtx.strokeRect(1, 1, mainCanvas.width - 2, mainCanvas.height - 2);
    repFlash--;
  }

  let nOn = 0; for (let a = 0; a < N_AGENTS; a++) if (lights[a]) nOn++;
  agentInfo.textContent = `ON: ${nOn} / ${N_AGENTS}  (${(100*nOn/N_AGENTS).toFixed(1)}%)`;
}

// ── Draw: σ_eff mini plot  (from saved data) ─────────────────────────────
function drawMiniPlot(canvas, yVals, xVals, color, currentP, label) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth || 230, H = canvas.offsetHeight || 72;
  canvas.width = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  const PAD = { t: 12, r: 6, b: 18, l: 44 };
  const pw = W - PAD.l - PAD.r, ph = H - PAD.t - PAD.b;
  ctx.clearRect(0, 0, W, H); ctx.fillStyle = cssColor('--surface-base'); ctx.fillRect(0, 0, W, H);
  if (!yVals || yVals.length === 0) return;
  const xMin = Math.min(...xVals), xMax = Math.max(...xVals);
  // Auto-scale Y: 0 to max(data, 1.0)*1.05 so the critical region is always visible
  const dataMax = Math.max(...yVals);
  const yMin = 0;
  const yMax = Math.max(dataMax, 1.0) * 1.05;
  const yRange = yMax - yMin;
  const toX = v => PAD.l + (v - xMin) / (xMax - xMin) * pw;
  const toY = v => PAD.t + (1 - (v - yMin) / yRange) * ph;
  // Axes
  ctx.strokeStyle = cssColor('--border-default'); ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PAD.l, PAD.t); ctx.lineTo(PAD.l, PAD.t + ph); ctx.lineTo(PAD.l + pw, PAD.t + ph);
  ctx.stroke();
  // Y ticks
  ctx.fillStyle = cssColor('--text-muted'); ctx.font = '9px monospace'; ctx.textAlign = 'right';
  const nTicks = 3;
  for (let k = 0; k <= nTicks; k++) {
    const v = yMin + k / nTicks * yRange, yy = toY(v);
    ctx.strokeStyle = cssColor('--border-default'); ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(PAD.l - 3, yy); ctx.lineTo(PAD.l, yy); ctx.stroke();
    ctx.fillStyle = cssColor('--text-muted'); ctx.fillText(v.toPrecision(3), PAD.l - 5, yy + 3);
  }
  // p_c vertical reference line
  ctx.setLineDash([3, 3]);
  const xPc = toX(P_C_MICRO);
  ctx.strokeStyle = 'rgba(255,255,255,.22)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(xPc, PAD.t); ctx.lineTo(xPc, PAD.t + ph); ctx.stroke();
  ctx.setLineDash([]);
  // Current p cursor
  const xCur = toX(currentP);
  ctx.strokeStyle = IC_CUR; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(xCur, PAD.t); ctx.lineTo(xCur, PAD.t + ph); ctx.stroke();
  // Data curve
  ctx.strokeStyle = color; ctx.lineWidth = 1.5;
  ctx.beginPath();
  xVals.forEach((p, k) => { const xx = toX(p), yy = toY(yVals[k]); k === 0 ? ctx.moveTo(xx, yy) : ctx.lineTo(xx, yy); });
  ctx.stroke();
  // Label
  ctx.fillStyle = cssColor('--text-muted'); ctx.textAlign = 'left'; ctx.font = '9px monospace';
  ctx.fillText(label, PAD.l + 4, PAD.t + 10);
}

function drawMetrics() {
  const m = METRICS[VI], curP = P_VALUES[PI];
  if (!m) { const c = plotSigma.getContext('2d'); c.clearRect(0,0,plotSigma.width,plotSigma.height); return; }
  drawMiniPlot(plotSigma, m.s, m.p, IC_SZ, curP, '\u03c3_eff');
}

// ── Draw: criticality heatmap  (D score from data, same as unified HTML) ──
;(function buildHeatmapData() {
  window.HM_D = {}; let gMax = -Infinity;
  VD_VALUES.forEach((_, vi) => {
    window.HM_D[vi] = {};
    Object.entries(DSCORES[vi] || {}).forEach(([pi, D]) => {
      window.HM_D[vi][+pi] = D; if (D > gMax) gMax = D;
    });
  });
  window.HM_D_MAX = gMax > 0 ? gMax : 1;
})();

const HEATMAP_H = 210;

function drawHeatmap() {
  const dpr = window.devicePixelRatio || 1;
  const W = heatCanvas.offsetWidth || 230, H = HEATMAP_H;
  heatCanvas.width = W * dpr; heatCanvas.height = H * dpr;
  const ctx = heatCanvas.getContext('2d'); ctx.scale(dpr, dpr);
  ctx.fillStyle = cssColor('--surface-base'); ctx.fillRect(0, 0, W, H);
  const PAD = { t: 4, r: 4, b: 18, l: 26 };
  const nVD = VD_VALUES.length, nP = P_VALUES.length;
  const pw = W - PAD.l - PAD.r, ph = H - PAD.t - PAD.b;
  const cw = pw / nP, ch = ph / nVD;
  const dMax = window.HM_D_MAX;
  for (let vi = 0; vi < nVD; vi++) {
    const yCell = PAD.t + (nVD - 1 - vi) * ch;
    for (let pi = 0; pi < nP; pi++) {
      const D = (window.HM_D[vi] || {})[pi];
      ctx.fillStyle = D === undefined ? '#181818' : heatColor(1 - D / dMax);
      ctx.fillRect(PAD.l + pi * cw, yCell, cw + 0.5, ch + 0.5);
    }
  }
  ctx.strokeStyle = cssColor('--text-primary'); ctx.lineWidth = 1.5;
  ctx.strokeRect(PAD.l + PI * cw + 0.5, PAD.t + (nVD - 1 - VI) * ch + 0.5, cw - 1, ch - 1);
  const piPc = P_VALUES.findIndex(p => p >= P_C_MICRO);
  if (piPc >= 0) {
    const xPc = PAD.l + piPc * cw;
    ctx.setLineDash([3, 2]); ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(xPc, PAD.t); ctx.lineTo(xPc, PAD.t + ph); ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.fillStyle = cssColor('--text-muted'); ctx.font = '8px monospace'; ctx.textAlign = 'center';
  [0, 6, 12, 18, 24].forEach(pi => {
    if (pi < nP) ctx.fillText(P_VALUES[pi].toFixed(3), PAD.l + (pi + 0.5) * cw, H - 4);
  });
  ctx.textAlign = 'right';
  [0, 8, 17, 26, 34].forEach(vi => {
    if (vi < nVD) ctx.fillText(VD_VALUES[vi], PAD.l - 2, PAD.t + (nVD - 1 - vi) * ch + ch * 0.5 + 3);
  });
}

// ── Info box ──────────────────────────────────────────────────────────────
function updateInfoBox() {
  const vd = VD_VALUES[VI], p = P_VALUES[PI];
  infoBox.innerHTML =
    `vision radius: <span class="info-accent">${vd}</span> &nbsp;&nbsp; ` +
    `p_micro: <span class="info-accent">${p.toFixed(6)}</span> &nbsp;&nbsp; ` +
    `p_c: <span class="info-soft">${P_C_MICRO.toFixed(5)}</span>`;
  const elapsed = simStartTime !== null ? ((performance.now() - simStartTime) / 1000).toFixed(1) : '0.0';
  simMetaEl.innerHTML =
    `${repStep}/${STEPS_PER_REP} steps &nbsp;·&nbsp; ` +
    `${repCount} rep${repCount !== 1 ? 's' : ''} &nbsp;·&nbsp; ` +
    `${elapsed}s elapsed`;
}

// ── Draw: avalanche log-log distributions ────────────────────────────────
function drawAvLog() {
  avCountEl.textContent = repCount > 0 ? `reps=${repCount} n=${avCount}` : (avCount > 0 ? `n=${avCount}` : '');
  const dpr = window.devicePixelRatio || 1;
  const W = avCanvas.offsetWidth || 230, H = avCanvas.offsetHeight || 120;
  avCanvas.width = W * dpr; avCanvas.height = H * dpr;
  const ctx = avCanvas.getContext('2d'); ctx.scale(dpr, dpr);
  ctx.fillStyle = cssColor('--surface-base'); ctx.fillRect(0, 0, W, H);

  if (avCount < AV_MIN) {
    ctx.font = '9px monospace'; ctx.textAlign = 'center';
    // After several reps with near-zero yield → all cascades censored (supercritical)
    if (repCount >= 4 && avCount < 3) {
      ctx.fillStyle = '#3a1a1a';
      ctx.fillText('supercritical', W / 2, H / 2 - 8);
      ctx.fillStyle = '#4a2a2a';
      ctx.fillText('all cascades censored', W / 2, H / 2 + 4);
      ctx.fillStyle = cssColor('--border-default');
      ctx.fillText(`${repCount} reps  ·  ${repCount * STEPS_PER_REP} steps`, W / 2, H / 2 + 16);
    } else {
      ctx.fillStyle = '#3a3a3a';
      const repInfo = repCount > 0 ? `  rep ${repCount}` : '';
      ctx.fillText(`collecting… ${avCount} / ${AV_MIN}${repInfo}`, W / 2, H / 2);
    }
    return;
  }

  const sz = logHist(avSizes, avCount);
  const dr = logHist(avDurs,  avCount);
  if (!sz && !dr) {
    ctx.font = '9px monospace'; ctx.textAlign = 'center';
    ctx.fillStyle = cssColor('--border-default');
    ctx.fillText('subcritical', W / 2, H / 2 - 8);
    ctx.fillStyle = cssColor('--border-default');
    ctx.fillText('all avalanches trivial (size = 1)', W / 2, H / 2 + 4);
    return;
  }

  const PAD = { t: 8, r: 8, b: 30, l: 46 };
  const pw = W - PAD.l - PAD.r, ph = H - PAD.t - PAD.b;

  // Combine axis ranges across both series
  let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
  for (const h of [sz, dr]) {
    if (!h) continue;
    for (let k = 0; k < h.centers.length; k++) {
      if (h.centers[k] < xMin) xMin = h.centers[k];
      if (h.centers[k] > xMax) xMax = h.centers[k];
      if (h.logProbs[k] < yMin) yMin = h.logProbs[k];
      if (h.logProbs[k] > yMax) yMax = h.logProbs[k];
    }
  }
  const xRange = xMax - xMin || 1, yRange = yMax - yMin || 1;
  const toX = v => PAD.l + (v - xMin) / xRange * pw;
  const toY = v => PAD.t + (1 - (v - yMin) / yRange) * ph;

  // Axes
  ctx.strokeStyle = cssColor('--border-default'); ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PAD.l, PAD.t); ctx.lineTo(PAD.l, PAD.t + ph); ctx.lineTo(PAD.l + pw, PAD.t + ph);
  ctx.stroke();

  // Grid lines + tick labels
  ctx.fillStyle = cssColor('--border-default'); ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  for (let v = Math.ceil(xMin); v <= Math.floor(xMax); v++) {
    const xx = toX(v);
    ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(xx, PAD.t); ctx.lineTo(xx, PAD.t + ph); ctx.stroke();
    ctx.fillStyle = cssColor('--border-default'); ctx.fillText(`10^${v}`, xx, PAD.t + ph + 12);
  }
  ctx.textAlign = 'right';
  for (let v = Math.ceil(yMin); v <= Math.floor(yMax); v++) {
    const yy = toY(v);
    ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(PAD.l, yy); ctx.lineTo(PAD.l + pw, yy); ctx.stroke();
    ctx.fillStyle = cssColor('--border-default'); ctx.fillText(`10^${v}`, PAD.l - 3, yy + 3);
  }

  // Draw a series: line + dots
  function drawSeries(h, color) {
    if (!h) return;
    ctx.strokeStyle = color; ctx.lineWidth = 1.5;
    ctx.beginPath();
    h.centers.forEach((c, k) => {
      const xx = toX(c), yy = toY(h.logProbs[k]);
      k === 0 ? ctx.moveTo(xx, yy) : ctx.lineTo(xx, yy);
    });
    ctx.stroke();
    ctx.fillStyle = color;
    h.centers.forEach((c, k) => {
      ctx.beginPath(); ctx.arc(toX(c), toY(h.logProbs[k]), 2.5, 0, Math.PI * 2); ctx.fill();
    });
  }
  drawSeries(sz, IC_SZ);
  drawSeries(dr, IC_DUR);

  // Alpha estimates (MLE) + legend (upper right)
  const aS = computeAlpha(avSizes, avCount);
  const aD = computeAlpha(avDurs,  avCount);
  ctx.font = '8px monospace'; ctx.textAlign = 'right';
  ctx.fillStyle = IC_SZ;
  ctx.fillText('size' + (aS ? `  \u03b1=${aS.toFixed(2)}` : ''), PAD.l + pw, PAD.t + 11);
  ctx.fillStyle = IC_DUR;
  ctx.fillText('dur' + (aD ? `   \u03b1=${aD.toFixed(2)}` : ''),  PAD.l + pw, PAD.t + 22);
  // Rep progress indicator (lower left)
  ctx.fillStyle = cssColor('--border-default'); ctx.textAlign = 'left';
  ctx.fillText(`reps ${repCount}  step ${repStep}/${STEPS_PER_REP}`, PAD.l, PAD.t + ph - 2);

  // Axis titles
  ctx.fillStyle = cssColor('--text-muted'); ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('size / duration', PAD.l + pw / 2, H - 4);
  ctx.save();
  ctx.translate(10, PAD.t + ph / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('log P(x)', 0, 0);
  ctx.restore();
}

// ── Update all ────────────────────────────────────────────────────────────
function updateAll() {
  drawFireflies(); drawMetrics(); drawHeatmap(); updateInfoBox(); drawAvLog();
  vdDisp.textContent = VD_VALUES[VI];
  pDisp.textContent  = P_VALUES[PI].toFixed(6);
}

// ── Animation loop ────────────────────────────────────────────────────────
let frameN = 0;
function loop(ts) {
  if (!playing) { raf = null; return; }
  if (lastTs === null) lastTs = ts;
  const dtMs = ts - lastTs;
  lastTs = ts;
  let stepped = false;
  if (speedSel.value === 'max') {
    // Run steps until ~14 ms of budget is spent (leaves time for rendering)
    const deadline = performance.now() + 14;
    do { macroStep(); stepped = true; } while (performance.now() < deadline);
  } else {
    accMs += dtMs * parseInt(speedSel.value);
    while (accMs >= MS_PER_STEP) { accMs -= MS_PER_STEP; macroStep(); stepped = true; }
  }
  if (stepped) {
    frameN++;
    drawFireflies();
    if (frameN % 4 === 0) { drawMetrics(); drawHeatmap(); updateInfoBox(); drawAvLog(); }
  }
  raf = requestAnimationFrame(loop);
}

function startPlay() {
  playing = true; lastTs = null; accMs = 0;
  playBtn.textContent = '\u23f8 Pause';
  if (!raf) raf = requestAnimationFrame(loop);
}
function stopPlay() {
  playing = false; playBtn.textContent = '\u25b6 Play';
}

// ── Slider fill gradient helper ───────────────────────────────────────────
function syncSlider(sl) {
  const pct = (sl.value - sl.min) / (sl.max - sl.min) * 100;
  sl.style.setProperty('--pct', pct + '%');
}
syncSlider(vdSl); syncSlider(pSl);

// ── Slider events ─────────────────────────────────────────────────────────
vdSl.addEventListener('input', () => {
  syncSlider(vdSl);
  VI = +vdSl.value; warmupCnt = 0; sigmaLive = NaN;
  resetAvalanches(); rebuildAdj(); computeObs(); updateAll();
});
pSl.addEventListener('input', () => {
  syncSlider(pSl);
  PI = +pSl.value; warmupCnt = 0; sigmaLive = NaN;
  resetAvalanches(); buildPowers(); updateAll();
});
playBtn.addEventListener('click', () => playing ? stopPlay() : startPlay());
document.getElementById('reset-btn').addEventListener('click', () => { stopPlay(); init(); updateAll(); startPlay(); });
adjTog.addEventListener('change', drawFireflies);

// ── Heatmap click → jump to (VI, PI) ─────────────────────────────────────
heatCanvas.addEventListener('click', e => {
  const rect = heatCanvas.getBoundingClientRect();
  const W = heatCanvas.offsetWidth, H = HEATMAP_H;
  const PAD = { t: 4, r: 4, b: 18, l: 26 };
  const nVD = VD_VALUES.length, nP = P_VALUES.length;
  const pw = W - PAD.l - PAD.r, ph = H - PAD.t - PAD.b;
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const pi = Math.floor((mx - PAD.l) / (pw / nP));
  const vi = nVD - 1 - Math.floor((my - PAD.t) / (ph / nVD));
  if (pi >= 0 && pi < nP && vi >= 0 && vi < nVD) {
    VI = vi; PI = pi;
    vdSl.value = vi; pSl.value = pi;
    syncSlider(vdSl); syncSlider(pSl);
    warmupCnt = 0; sigmaLive = NaN;
    resetAvalanches(); buildPowers(); rebuildAdj(); computeObs();
    updateAll(); startPlay();
  }
});

// ── Init ─────────────────────────────────────────────────────────────────
vdSl.max = VD_VALUES.length - 1;
pSl.max  = P_VALUES.length  - 1;
// Start at a VD in the middle of the range (likely to have interesting dynamics)
VI = Math.floor(VD_VALUES.length / 2);
PI = Math.floor(P_VALUES.length  / 2);
vdSl.value = VI; pSl.value = PI;
syncSlider(vdSl); syncSlider(pSl);

resizeMain();
init();
updateAll();
startPlay();

</script>
</body>
